services:
  - type: web
    name: expediente-medico-digital
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips '*'
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DOCTOR_USERNAME
        value: doctor
      - key: DOCTOR_PASSWORD
        value: Cambiar123!
      - key: APP_COOKIE_SECURE
        value: "true"
      - key: TSE_LOOKUP_ENABLED
        value: "false"
      - key: BASE_URL
        value: https://expediente-medico-digital.onrender.com
