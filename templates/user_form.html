{% extends "base.html" %}
{% block content %}
<header class="topbar">
  <div>
    <h1>{% if user %}Editar usuario{% else %}Nuevo usuario{% endif %}</h1>
    <p class="muted">Expediente M&eacute;dico Digital</p>
  </div>
  <a class="buttonlink" href="/doctor/users">Volver a usuarios</a>
</header>

<section class="card narrow">
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{% if user %}/doctor/users/{{ user.id }}/edit{% else %}/doctor/users/new{% endif %}" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    {% if not user %}
    <label>Usuario<input name="username" required autocomplete="off"></label>
    <label>Contrase&ntilde;a<input name="password" type="password" required minlength="8" autocomplete="new-password"></label>
    {% endif %}
    <label>Nombre completo<input name="full_name" value="{{ user.full_name if user else '' }}"></label>
    <label>Email<input name="email" type="email" value="{{ user.email if user else '' }}"></label>
    <label>Rol
      <select name="role">
        <option value="doctor" {% if user and user.role == 'doctor' %}selected{% endif %}>M&eacute;dico</option>
        <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Administrador</option>
      </select>
    </label>
    {% if user %}
    <label class="checkbox-label">
      <input type="checkbox" name="is_active" value="1" {% if user.is_active %}checked{% endif %}> Usuario activo
    </label>
    {% endif %}
    <button>{% if user %}Guardar cambios{% else %}Crear usuario{% endif %}</button>
  </form>
</section>
{% endblock %}
