{% extends "base.html" %}
{% block content %}
<header class="topbar">
  <div>
    <h1>Cambiar contrase&ntilde;a</h1>
    <p class="muted">Expediente M&eacute;dico Digital</p>
  </div>
  <a class="buttonlink" href="/doctor">Volver al panel</a>
</header>

<section class="card narrow">
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  {% if success %}<p class="success">{{ success }}</p>{% endif %}
  <form method="post" action="/doctor/change-password" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Contrase&ntilde;a actual<input name="current_password" type="password" required autocomplete="current-password"></label>
    <label>Nueva contrase&ntilde;a<input name="new_password" type="password" required autocomplete="new-password" minlength="8"></label>
    <label>Confirmar nueva contrase&ntilde;a<input name="confirm_password" type="password" required autocomplete="new-password" minlength="8"></label>
    <p class="muted">M&iacute;nimo 8 caracteres. Se recomienda incluir may&uacute;sculas, min&uacute;sculas, n&uacute;meros y s&iacute;mbolos.</p>
    <button>Guardar contrase&ntilde;a</button>
  </form>
</section>
{% endblock %}
